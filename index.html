<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>กองโจร บาคาร่า - DNA 32</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --accent: #fbc02d;
            --p-color: #3b82f6;
            --b-color: #ef4444;
            --t-color: #22c55e;
            --text-main: #f8fafc;
            --border: #334155;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body { 
            font-family: 'Segoe UI', system-ui, sans-serif; 
            background: var(--bg-color); color: var(--text-main); 
            margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center;
        }

        .tabs { display: flex; width: 100%; max-width: 400px; gap: 8px; margin-bottom: 12px; }
        .tab-btn { flex: 1; padding: 12px; border: none; background: var(--card-bg); color: #94a3b8; cursor: pointer; border-radius: 12px; font-weight: bold; transition: 0.3s; }
        .tab-btn.active { background: var(--accent); color: #000; box-shadow: 0 4px 10px rgba(251, 192, 45, 0.3); }
        
        .container { width: 100%; max-width: 400px; display: none; }
        .container.active { display: block; }
        .card { background: var(--card-bg); border-radius: 20px; padding: 15px; border: 1px solid var(--border); margin-bottom: 12px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.3); }

        /* Prediction Center */
        .prediction-zone { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 180px; text-align: center; }
        .target-box-3d {
            width: 120px; height: 120px; background: #1e293b; border-radius: 30px;
            border: 1px solid rgba(255,255,255,0.1); box-shadow: 0 10px 25px rgba(0,0,0,0.4);
            display: flex; align-items: center; justify-content: center;
            font-size: 50px; font-weight: 900; color: #334155;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            margin-bottom: 10px;
        }
        .active-P-3d { background: linear-gradient(145deg, #3b82f6, #2563eb); color: #fff !important; transform: scale(1.1); box-shadow: 0 0 30px rgba(59, 130, 246, 0.5); }
        .active-B-3d { background: linear-gradient(145deg, #ef4444, #dc2626); color: #fff !important; transform: scale(1.1); box-shadow: 0 0 30px rgba(239, 68, 68, 0.5); }
        .status-text { font-size: 0.9rem; color: #94a3b8; font-weight: bold; }

        /* Grid */
        .grid-container {
            display: grid; grid-template-rows: repeat(6, 1fr); grid-template-columns: repeat(12, 1fr);
            grid-auto-flow: column; gap: 4px; background: #0f172a; padding: 10px;
            border-radius: 12px; aspect-ratio: 12 / 6; width: 100%; border: 1px solid #334155;
        }
        .dot { width: 100%; aspect-ratio: 1/1; border-radius: 50%; background: #1e293b; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: bold; border: 1px solid #334155; }
        .dot.P { background: var(--p-color); color: white; border-color: #60a5fa; }
        .dot.B { background: var(--b-color); color: white; border-color: #f87171; }
        .dot.T { background: var(--t-color); color: white; border-color: #4ade80; }

        /* Buttons */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; margin-top: 5px; }
        .btn { padding: 20px; border: none; border-radius: 16px; font-size: 1.8rem; font-weight: 900; color: white; cursor: pointer; transition: 0.1s; }
        .btn:active { transform: translateY(3px); }
        .btn-p { background: var(--p-color); }
        .btn-b { background: var(--b-color); }
        .btn-t { background: var(--t-color); font-size: 1.2rem; }

        .bottom-controls { display: flex; justify-content: center; gap: 15px; width: 100%; margin-top: 15px; }
        .btn-mini { width: 80px; padding: 12px 0; border: none; border-radius: 12px; background: #334155; color: #f8fafc; font-size: 0.75rem; font-weight: bold; cursor: pointer; border: 1px solid rgba(255,255,255,0.05); }

        /* Settings Table */
        .step-selector { display: grid; grid-template-columns: repeat(5, 1fr); gap: 8px; margin-top: 10px; }
        .step-item { 
            background: #0f172a; border: 1px solid var(--border); padding: 12px 5px; 
            border-radius: 10px; text-align: center; cursor: pointer; font-weight: bold;
        }
        .step-item.active { background: var(--accent); color: #000; border-color: var(--accent); }

        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(6px); }
        .overlay.active { display: flex; }
        .modal { background: var(--card-bg); width: 85%; max-width: 320px; padding: 25px; border-radius: 25px; text-align: center; border: 1px solid var(--border); }
    </style>
</head>
<body>

    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('scanner')">สแกน DNA</button>
        <button class="tab-btn" onclick="switchTab('settings')">ตั้งค่าไม้ทบ</button>
    </div>

    <div id="scanner" class="container active">
        <div class="card prediction-zone">
            <div id="target" class="target-box-3d">?</div>
            <div id="status-text" class="status-text"></div>
        </div>

        <div class="card" style="padding: 10px;">
            <div id="grid" class="grid-container"></div>
        </div>

        <div class="btn-grid">
            <button class="btn btn-p" onclick="handleInput('P')">P</button>
            <button class="btn btn-t" onclick="handleInput('T')">T</button>
            <button class="btn btn-b" onclick="handleInput('B')">B</button>
        </div>
        
        <div class="bottom-controls">
            <button class="btn-mini" onclick="undo()">ย้อนกลับ</button>
            <button class="btn-mini" style="color:#f87171" onclick="showResetModal()">รีเซ็ต</button>
        </div>
    </div>

    <div id="settings" class="container">
        <div class="card">
            <h4 style="margin:0 0 10px 0; color:var(--accent)">เลือกจำนวนไม้ทบ (Martingale)</h4>
            <div class="step-selector" id="step-selector">
                </div>
            <p style="font-size: 0.75rem; color: #94a3b8; margin-top: 15px;">* ระบบจะเริ่มนับไม้ใหม่เมื่อชนะ หรือเมื่อทบจนครบจำนวนที่กำหนด</p>
        </div>
    </div>

    <div id="reset-modal" class="overlay">
        <div class="modal">
            <h2 style="color:#f87171">ล้างข้อมูล?</h2>
            <p>ประวัติการสแกนจะถูกเริ่มต้นใหม่</p>
            <div style="display:flex; gap:10px; margin-top:20px;">
                <button style="flex:1; padding:12px; border:none; border-radius:12px; background:#475569; color:white" onclick="closeModal()">ยกเลิก</button>
                <button style="flex:1; padding:12px; border:none; border-radius:12px; background:var(--b-color); color:white" onclick="confirmReset()">ล้างทั้งหมด</button>
            </div>
        </div>
    </div>

<script>
    let log = []; 
    let historyStack = [];
    let maxSteps = 4;
    let profiles = [];
    let state = { stepIdx: 0, isFound: false, aim: "", activeDNA: -1 };

    // สร้าง DNA Profiles
    for(let i=0; i<32; i++) profiles.push(i.toString(2).padStart(5,'0').split('').map(b => b === '0' ? 'M' : 'T'));

    function switchTab(id) {
        document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
    }

    function initStepSelector() {
        const container = document.getElementById('step-selector');
        container.innerHTML = "";
        for(let i=1; i<=10; i++) {
            const div = document.createElement('div');
            div.className = `step-item ${i === maxSteps ? 'active' : ''}`;
            div.innerText = i;
            div.onclick = () => {
                maxSteps = i;
                if(state.stepIdx >= maxSteps) state.stepIdx = 0;
                initStepSelector();
                render();
            };
            container.appendChild(div);
        }
    }

    function handleInput(v) {
        historyStack.push(JSON.stringify({ log: [...log], state: {...state} }));

        if (v !== 'T' && state.isFound && state.aim !== "") {
            if (v === state.aim) {
                state.stepIdx = 0;
                state.isFound = false; 
            } else {
                state.stepIdx++;
                if (state.stepIdx >= maxSteps) state.stepIdx = 0;
                state.isFound = false; 
            }
        }

        log.push(v);
        if (log.length > 72) log.shift();
        render();
    }

    function undo() { 
        if (historyStack.length > 0) { 
            let last = JSON.parse(historyStack.pop()); 
            log = last.log; state = last.state; 
            render(); 
        } 
    }

    function showResetModal() { document.getElementById('reset-modal').classList.add('active'); }
    function closeModal() { document.getElementById('reset-modal').classList.remove('active'); }
    function confirmReset() {
        log = []; historyStack = [];
        state = { stepIdx: 0, isFound: false, aim: "", activeDNA: -1 };
        closeModal();
        render();
    }

    function render() {
        const grid = document.getElementById('grid');
        grid.innerHTML = "";
        for(let i=0; i<72; i++) {
            const d = document.createElement('div'); d.className = 'dot';
            if(log[i]) { d.className += ' ' + log[i]; d.innerText = log[i]; }
            grid.appendChild(d);
        }

        const targetUI = document.getElementById('target'), 
              statusUI = document.getElementById('status-text');
        
        targetUI.className = "target-box-3d"; 
        targetUI.innerText = "?";

        const clean = log.filter(x => x !== 'T');

        // Logic Scan ❌5
        if (clean.length >= 6 && !state.isFound) {
            for (let d = 0; d < 32; d++) {
                let streak = 0;
                for (let r = 1; r < clean.length; r++) {
                    let prev = clean[r-1], actual = clean[r], bit = profiles[d][r % 5];
                    let predict = (bit === 'M') ? prev : (prev === 'P' ? 'B' : 'P');
                    if (predict !== actual) streak++; else streak = 0;
                }
                if (streak === 5) { 
                    state.isFound = true; 
                    state.activeDNA = d; 
                    break; 
                }
            }
        }

        if (state.isFound && state.activeDNA !== -1) {
            let lastPrev = clean[clean.length-1];
            let bit = profiles[state.activeDNA][clean.length % 5];
            state.aim = (bit === 'M') ? lastPrev : (lastPrev === 'P' ? 'B' : 'P');
            
            // แสดงไม้ที่ + ผลพยากรณ์ เช่น 1P, 2B
            targetUI.innerText = (state.stepIdx + 1) + state.aim; 
            targetUI.classList.add(`active-${state.aim}-3d`);
            statusUI.innerText = ""
        } else {
            statusUI.innerText = state.stepIdx > 0 
                ? `รอสแกนจุดเข้า (กำลังทบไม้ที่ ${state.stepIdx + 1})` 
                : "รอข้อมูลสแกนจุดเข้า";
        }
    }

    initStepSelector();
    render();
</script>
</body>
</html>
