<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Vertical DNA Floating</title>
    <style>
        :root {
            --p-color: #007bff;
            --b-color: #dc3545;
            --bg-dark: #121212;
            --card-bg: #1e1e1e;
        }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            margin: 0; padding: 0; 
            background: var(--bg-dark); 
            color: #e0e0e0;
        }

        /* ส่วนควบคุมด้านบน (ตรึงอยู่กับที่) */
        .header {
            position: sticky; top: 0;
            background: #282828;
            padding: 10px 5px;
            z-index: 1000;
            display: flex; flex-direction: column;
            gap: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
        }

        .btn-group { display: flex; justify-content: center; gap: 8px; }
        
        button { border: none; border-radius: 6px; cursor: pointer; font-weight: bold; color: white; transition: 0.1s; }
        .btn-p { background: var(--p-color); width: 70px; height: 45px; font-size: 20px; box-shadow: 0 0 10px rgba(0,123,255,0.3); }
        .btn-b { background: var(--b-color); width: 70px; height: 45px; font-size: 20px; box-shadow: 0 0 10px rgba(220,53,69,0.3); }
        .btn-util { background: #444; padding: 5px 12px; font-size: 13px; flex: 1; }
        
        button:active { transform: scale(0.92); opacity: 0.8; }

        .status-info { font-size: 12px; color: #888; text-align: center; }

        /* ส่วนแสดงผลตารางเรียงลงมา */
        .list-container {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .dna-card {
            background: var(--card-bg);
            border-radius: 8px;
            padding: 8px;
            border-left: 3px solid #444;
            overflow-x: auto; /* ให้ตารางเลื่อนซ้ายขวาได้ถ้าแถวยาวเกินจอ */
        }

        .dna-label {
            font-size: 12px;
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 6px;
            display: flex; justify-content: space-between;
        }

        .dna-table { border-collapse: collapse; background: #000; }
        .dna-table td {
            width: 18px; height: 18px;
            border: 0.5px solid #222;
            text-align: center;
            font-size: 10px;
            font-weight: bold;
        }

        .cell-P { background: var(--p-color); color: white; }
        .cell-B { background: var(--b-color); color: white; }
        .cell-empty { background: transparent; }

        /* ซ่อน Scrollbar ของตารางแต่ยังเลื่อนได้ */
        .dna-card::-webkit-scrollbar { height: 2px; }
        .dna-card::-webkit-scrollbar-thumb { background: #333; }
    </style>
</head>
<body>

<div class="header">
    <div class="btn-group">
        <button class="btn-p" onclick="addData('P')">P</button>
        <button class="btn-b" onclick="addData('B')">B</button>
    </div>
    <div class="btn-group">
        <button class="btn-util" onclick="undo()">ย้อนกลับ</button>
        <button class="btn-util" onclick="resetAll()">ล้าง</button>
    </div>
    <div class="status-info">จดไปแล้ว: <b id="count" style="color:#fff">0</b> ตา</div>
</div>

<div class="list-container" id="list">
    </div>

<script>
    let rawData = [];
    const layouts = Array.from({length: 19}, (_, i) => i + 2); // 2 ถึง 20

    function addData(type) {
        rawData.push(type);
        render();
    }

    function undo() {
        rawData.pop();
        render();
    }

    function resetAll() {
        if(confirm("ล้างข้อมูล?")) {
            rawData = [];
            render();
        }
    }

    function render() {
        document.getElementById('count').innerText = rawData.length;
        const container = document.getElementById('list');
        container.innerHTML = '';

        layouts.forEach(rows => {
            const card = document.createElement('div');
            card.className = 'dna-card';
            
            // คำนวณคอลัมน์ (แสดงอย่างน้อย 12 คอลัมน์)
            const cols = Math.max(12, Math.ceil(rawData.length / rows) + 1);

            let html = `<div class="dna-label"><span>DNA PATTERN: ${rows} แถว</span></div>`;
            html += `<table class="dna-table">`;
            
            for (let i = 0; i < rows; i++) {
                html += `<tr>`;
                for (let j = 0; j < cols; j++) {
                    const dataIndex = (j * rows) + i;
                    const val = rawData[dataIndex] || '';
                    const cellClass = val ? `cell-${val}` : 'cell-empty';
                    html += `<td class="${cellClass}">${val}</td>`;
                }
                html += `</tr>`;
            }
            html += `</table>`;
            
            card.innerHTML = html;
            container.appendChild(card);
        });
    }

    render();
</script>

</body>
</html>
